{% extends "base.html" %}

{% block title %}Login - Lumiora{% endblock %}

{% block content %}
<section style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--lumiora-deep), var(--lumiora-dark)); padding: 100px 20px 50px;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="text-center mb-4">
                    <div style="width: 70px; height: 70px; background: linear-gradient(135deg, var(--lumiora-mauve), var(--lumiora-plum)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; box-shadow: 0 0 30px rgba(109, 60, 82, 0.4);">
                        <i class="fas fa-graduation-cap" style="font-size: 2rem; color: var(--lumiora-gold);"></i>
                    </div>
                    <h2 style="color: var(--lumiora-light); font-family: 'Playfair Display', serif; margin-bottom: 0.5rem;">Welcome Back</h2>
                    <p style="color: var(--lumiora-accent);">Login to continue your learning journey</p>
                </div>

                <div class="form-lumiora">
                    <form method="POST" action="{{ url_for('login') }}">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <div class="position-relative">
                                <i class="fas fa-envelope position-absolute" style="left: 15px; top: 50%; transform: translateY(-50%); color: var(--lumiora-accent);"></i>
                                <input type="email" name="email" class="form-control" placeholder="Enter your email" required style="padding-left: 45px; background: rgba(27, 12, 26, 0.6); border: 1px solid rgba(250, 220, 213, 0.2); color: var(--lumiora-light); border-radius: 10px; padding: 0.8rem 1rem 0.8rem 45px;">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="position-relative">
                                <i class="fas fa-lock position-absolute" style="left: 15px; top: 50%; transform: translateY(-50%); color: var(--lumiora-accent);"></i>
                                <input type="password" name="password" class="form-control" placeholder="Enter your password" required style="padding-left: 45px; background: rgba(27, 12, 26, 0.6); border: 1px solid rgba(250, 220, 213, 0.2); color: var(--lumiora-light); border-radius: 10px; padding: 0.8rem 1rem 0.8rem 45px;">
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="remember" id="remember" style="background: rgba(27, 12, 26, 0.6); border-color: rgba(250, 220, 213, 0.3);">
                                <label class="form-check-label" for="remember" style="color: var(--lumiora-accent); font-size: 0.9rem;">Remember me</label>
                            </div>
                            <a href="#" style="color: var(--lumiora-gold); text-decoration: none; font-size: 0.9rem;" onclick="alert('Password reset feature coming soon!'); return false;">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn btn-lumiora w-100 mb-3">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p style="color: var(--lumiora-accent);">Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--lumiora-gold); text-decoration: none; font-weight: 600;">Register here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
