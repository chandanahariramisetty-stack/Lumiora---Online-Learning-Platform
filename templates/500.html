{% extends "base.html" %}

{% block title %}500 - Server Error - Lumiora{% endblock %}

{% block content %}
<section style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--lumiora-deep), var(--lumiora-dark)); padding: 100px 20px;">
    <div class="text-center">
        <div style="width: 150px; height: 150px; background: linear-gradient(135deg, var(--lumiora-mauve), var(--lumiora-plum)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; box-shadow: 0 0 50px rgba(109, 60, 82, 0.3);">
            <i class="fas fa-exclamation-triangle" style="font-size: 4rem; color: var(--lumiora-gold);"></i>
        </div>
        <h1 style="color: var(--lumiora-light); font-family: 'Playfair Display', serif; font-size: 4rem; margin-bottom: 1rem;">500</h1>
        <h2 style="color: var(--lumiora-light); font-family: 'Playfair Display', serif; margin-bottom: 1rem;">Server Error</h2>
        <p style="color: var(--lumiora-accent); font-size: 1.1rem; max-width: 400px; margin: 0 auto 2rem;">Something went wrong on our end. Don't worry, we're working to fix it. Please try again later.</p>
        <a href="{{ url_for('home') }}" class="btn btn-lumiora btn-lg">
            <i class="fas fa-home me-2"></i>Back to Home
        </a>
    </div>
</section>
{% endblock %}
