{% extends "base.html" %}

{% block title %}Register - Lumiora{% endblock %}

{% block content %}
<section style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--lumiora-deep), var(--lumiora-dark)); padding: 100px 20px 50px;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="text-center mb-4">
                    <div style="width: 70px; height: 70px; background: linear-gradient(135deg, var(--lumiora-mauve), var(--lumiora-plum)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; box-shadow: 0 0 30px rgba(109, 60, 82, 0.4);">
                        <i class="fas fa-user-plus" style="font-size: 2rem; color: var(--lumiora-gold);"></i>
                    </div>
                    <h2 style="color: var(--lumiora-light); font-family: 'Playfair Display', serif; margin-bottom: 0.5rem;">Create Account</h2>
                    <p style="color: var(--lumiora-accent);">Join Lumiora and start learning today</p>
                </div>

                <div class="form-lumiora">
                    <form method="POST" action="{{ url_for('register') }}">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <div class="position-relative">
                                <i class="fas fa-user position-absolute" style="left: 15px; top: 50%; transform: translateY(-50%); color: var(--lumiora-accent);"></i>
                                <input type="text" name="full_name" class="form-control" placeholder="Enter your full name" required style="padding-left: 45px; background: rgba(27, 12, 26, 0.6); border: 1px solid rgba(250, 220, 213, 0.2); color: var(--lumiora-light); border-radius: 10px; padding: 0.8rem 1rem 0.8rem 45px;">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <div class="position-relative">
                                <i class="fas fa-envelope position-absolute" style="left: 15px; top: 50%; transform: translateY(-50%); color: var(--lumiora-accent);"></i>
                                <input type="email" name="email" class="form-control" placeholder="Enter your email" required style="padding-left: 45px; background: rgba(27, 12, 26, 0.6); border: 1px solid rgba(250, 220, 213, 0.2); color: var(--lumiora-light); border-radius: 10px; padding: 0.8rem 1rem 0.8rem 45px;">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="position-relative">
                                <i class="fas fa-lock position-absolute" style="left: 15px; top: 50%; transform: translateY(-50%); color: var(--lumiora-accent);"></i>
                                <input type="password" name="password" class="form-control" placeholder="Create a password" required style="padding-left: 45px; background: rgba(27, 12, 26, 0.6); border: 1px solid rgba(250, 220, 213, 0.2); color: var(--lumiora-light); border-radius: 10px; padding: 0.8rem 1rem 0.8rem 45px;">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Confirm Password</label>
                            <div class="position-relative">
                                <i class="fas fa-lock position-absolute" style="left: 15px; top: 50%; transform: translateY(-50%); color: var(--lumiora-accent);"></i>
                                <input type="password" name="confirm_password" class="form-control" placeholder="Confirm your password" required style="padding-left: 45px; background: rgba(27, 12, 26, 0.6); border: 1px solid rgba(250, 220, 213, 0.2); color: var(--lumiora-light); border-radius: 10px; padding: 0.8rem 1rem 0.8rem 45px;">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Role</label>
                            <select name="role" class="form-select" style="background: rgba(27, 12, 26, 0.6); border: 1px solid rgba(250, 220, 213, 0.2); color: var(--lumiora-light); border-radius: 10px;">
                                <option value="Student">Student</option>
                                <option value="Instructor">Instructor</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-lumiora w-100 mb-3">
                            <i class="fas fa-user-plus me-2"></i>Register
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p style="color: var(--lumiora-accent);">Already have an account? <a href="{{ url_for('login') }}" style="color: var(--lumiora-gold); text-decoration: none; font-weight: 600;">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
